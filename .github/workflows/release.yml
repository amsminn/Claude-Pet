name: release

# Tag a version (vX.Y.Z must equal package.json "version") to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds the macOS arm64 + x64 zips (free ad-hoc signing — no Developer ID, no
# notarization) and publishes them to the GitHub Release. install.sh pulls them.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create/upload the GitHub Release

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Guard — tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag '$TAG' != package.json version '$PKG'"
            exit 1
          fi

      - run: npm ci

      - run: npm test
      - run: npm run typecheck

      # Build only — do NOT let electron-builder publish. Its multi-arch
      # publisher races (two parallel "create release" calls collide) and can
      # exit before the large zips finish uploading, leaving a release with only
      # the small blockmaps. We upload via gh instead (single, synchronous).
      - name: Build (arm64 + x64, ad-hoc signed)
        run: npm run dist -- --mac --arm64 --x64 --publish never

      - name: Publish release (single synchronous upload, no race)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            ./dist/*.zip
          gh release upload "$GITHUB_REF_NAME" ./dist/*.blockmap ./dist/latest-mac.yml --clobber || true
