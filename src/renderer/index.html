<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' ws: wss:;" />
<title>Claude-Pet</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Pet widget (= real product components ⑤⑥). No mock panel / stage. -->
  <div class="widget" id="widget">
    <div class="cards" id="cards"></div>
    <button class="collapse" id="collapse" title="스택 접기/펴기" aria-label="스택 접기">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="pet" id="pet">
      <div class="pet__sprite" id="petSprite"></div>
      <div class="pet__count" id="petCount" hidden>0</div>
      <div class="pet__say" id="petSay" hidden></div>
    </div>
  </div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
